name: Backend Runner

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Run duration (e.g. 1h, 2h)'
        default: '2h'
        required: false

jobs:
  run-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: python -m pytest tests/ -v --tb=short

      - name: Setup Cloudflare Tunnel
        env:
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          chmod +x scripts/setup_cloudflare.sh
          ./scripts/setup_cloudflare.sh
          sleep 3

      - name: Start Backend
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
        run: |
          DURATION="${{ github.event.inputs.duration }}"
          BACKEND_URL="https://${{ vars.CLOUDFLARE_DOMAIN }}"
          echo "🚀 Starting backend for $DURATION..."
          echo "🌐 Backend accessible at: $BACKEND_URL"
          echo ""
          echo "📋 Set this in Vercel Environment Variables:"
          echo "   NEXT_PUBLIC_API_URL = $BACKEND_URL"
          echo ""
          timeout $DURATION python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 || echo "⏹️ Backend stopped after $DURATION."
